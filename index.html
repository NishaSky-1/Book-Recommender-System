<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>
<body style="background-color:black; color:white;">

    <nav class="navbar" style="background-color:#00a65a;">
        <p class="navbar-brand" style="color: white; font-size: 24px;">My Book recommender</p>
    </nav>
    
    <div class="container">
        <div class="row">
            <div Class="col-md-8 col-md-offset-2">
                <h2 class="text-center" style="margin-top: 50px;">Select a Book</h2>

                <form method="POST" action="/recommend" style="margin-top: 20px;">
                    <select name="book" class="form-control form-control-lg">
                        {% for book in book_list %}
                        <option value="{{ book }}">{{book}}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-succes btn-lg btn-block" style="margin-top: 20px;">Recommend</button>
                </form>

                {% if recommendations %}
                <div class="mt-5" style="margin-top: 50px;">
                    <h3 class="text-center">Because you liked "{{ selected_book }}"</h3>
                    <ul class="list-group" style="margin-top: 20px;">
                        {% for rec in recommendations %}
                        <li class="list-group-item" style="background-color: #333; color: white; font-size: 18px;">{{ rec }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
    
</body>
</html>
