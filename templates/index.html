<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, install-scale=1.0">
  <title>Book Recommend System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center mb-4">Book Recommender System</h1>

    <form action="/recommend" method="post" class="card p-4 shadow">
      <div class="mb-3">
        <label class="form-label">Select a Book</label>
        <select name="book" class="form-select">
          {% for book in books %}
          <option value="{{book}}">{{book}}</option>
          {% endfor %}
        </select>
        <div>
          <button type="submit" class="btn btn-primary w-100">Recommend</button>button>
    </form>

          {% for recommendations %}
          <div class="mt-4">
            <h3>Recommended Book:</h3>
            <ul class="list-group">
              {% for book in recommendations %}
                  <li class="list-group-item">{{ book }}</li>
              {% endfor %}
            </ul>
          </div>
